// SVG caustics overlay for animated light effects
<svg width="100%" height="100%" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <defs>
    <filter id="caustics" x="-50%" y="-50%" width="200%" height="200%">
      <feTurbulence id="turb" type="turbulence" baseFrequency="0.015 0.03" numOctaves="3" seed="2" result="turb"/>
      <feDisplacementMap in2="turb" in="SourceGraphic" scale="60" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <linearGradient id="causticGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#causticGrad)" filter="url(#caustics)">
    <animate attributeName="filter" values="url(#caustics);url(#caustics)" dur="7s" repeatCount="indefinite"/>
  </rect>
</svg>
